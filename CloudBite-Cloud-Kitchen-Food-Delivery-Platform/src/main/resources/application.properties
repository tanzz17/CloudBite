spring.application.name=CloudBite-Cloud-Kitchen-Food-Delivery-Platform
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
server.port=${PORT:8080}

# Database (Railway/MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# Public backend URL (no trailing slash) — used when stripping stored image URLs for file deletes.
# Override on Render if your service URL changes: APP_BACKEND_PUBLIC_URL
app.backend.public-url=${APP_BACKEND_PUBLIC_URL:https://cloudbite-backend.onrender.com}

# CORS (production only). Add your Vercel production URL and any custom domain.
# Preview deployments: https://*.vercel.app is already allowed via pattern below.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://cloudbite-frontend.vercel.app,https://*.vercel.app}
